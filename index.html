<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calendar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --text: #1a1a1a;
    --muted: #9a9a9a;
    --border: #ececec;
    --accent: #e8dcc4;
    --accent-strong: #d4b896;
    --hover: #f5f5f4;
    --today: #1a1a1a;
    --danger: #c44;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --surface: #222221;
      --text: #f0f0ef;
      --muted: #6b6b6a;
      --border: #2e2e2d;
      --accent: #4a3f2a;
      --accent-strong: #7a6544;
      --hover: #2a2a29;
      --today: #f0f0ef;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    -webkit-font-smoothing: antialiased;
  }

  .app { width: 100%; max-width: 460px; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .month-label {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  .header-right { display: flex; align-items: center; gap: 10px; }
  .nav { display: flex; gap: 4px; }

  .nav button {
    width: 32px; height: 32px;
    border: none; background: transparent;
    color: var(--text); border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s ease;
    font-size: 16px;
  }
  .nav button:hover { background: var(--hover); }

  .avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    background-size: cover;
    background-position: center;
    background-color: var(--hover);
    cursor: pointer;
    border: 1px solid var(--border);
  }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 8px;
  }
  .weekdays span {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 4px 0;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .day {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s ease;
    position: relative;
    user-select: none;
  }
  .day:hover { background: var(--hover); }
  .day.muted { color: var(--muted); }
  .day.today { font-weight: 600; color: var(--today); }
  .day.today::after {
    content: '';
    position: absolute;
    bottom: 6px;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--today);
  }
  .day.has-note { background: var(--accent); color: var(--text); }
  .day.has-note:hover { background: var(--accent-strong); }
  .day.selected {
    outline: 1.5px solid var(--text);
    outline-offset: -1.5px;
  }

  .editor {
    margin-top: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.2s ease, max-height 0.2s ease, padding 0.2s ease;
    padding: 0 16px;
  }
  .editor.active {
    opacity: 1;
    max-height: 300px;
    padding: 16px;
  }
  .editor-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .editor-date { font-size: 13px; color: var(--muted); font-weight: 500; }
  .editor-close {
    border: none; background: transparent;
    color: var(--muted); cursor: pointer;
    font-size: 18px; line-height: 1;
    padding: 2px 6px; border-radius: 4px;
  }
  .editor-close:hover { background: var(--hover); color: var(--text); }

  textarea {
    width: 100%;
    border: none; background: transparent;
    color: var(--text);
    font-family: inherit; font-size: 14px;
    resize: none; outline: none;
    min-height: 60px; line-height: 1.5;
  }
  textarea::placeholder { color: var(--muted); }

  .editor-actions {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 8px; gap: 8px;
  }
  .status { font-size: 11px; color: var(--muted); transition: opacity 0.3s ease; }
  .delete-btn {
    border: none; background: transparent;
    color: var(--muted); cursor: pointer;
    font-size: 12px; padding: 4px 8px; border-radius: 6px;
  }
  .delete-btn:hover { color: var(--danger); background: var(--hover); }

  .footer {
    margin-top: 20px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
  }

  /* Sign-in screen */
  .signin {
    text-align: center;
    padding: 60px 20px;
  }
  .signin h1 {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .signin p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
  }
  .google-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s ease;
    font-family: inherit;
  }
  .google-btn:hover { background: var(--hover); }
  .google-btn svg { width: 18px; height: 18px; }

  .signin-error {
    color: var(--danger);
    font-size: 12px;
    margin-top: 14px;
    min-height: 16px;
  }

  /* Menu */
  .menu {
    position: absolute;
    top: 56px;
    right: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px;
    min-width: 180px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    display: none;
    z-index: 10;
  }
  .menu.open { display: block; }
  .menu-info {
    padding: 8px 10px;
    font-size: 12px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
    word-break: break-all;
  }
  .menu button {
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    color: var(--text);
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  .menu button:hover { background: var(--hover); }

  .loading-pulse {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="app">
    <!-- Sign-in screen -->
    <div id="signinScreen" style="display: none;">
      <div class="signin">
        <h1>Calendar</h1>
        <p>Sign in to sync your notes across devices.</p>
        <button class="google-btn" id="googleSignIn">
          <svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
            <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
            <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
          </svg>
          Sign in with Google
        </button>
        <div class="signin-error" id="signinError"></div>
      </div>
    </div>

    <!-- Calendar screen -->
    <div id="calendarScreen" style="display: none;">
      <header>
        <div class="month-label" id="monthLabel">—</div>
        <div class="header-right">
          <div class="nav">
            <button id="prevBtn" aria-label="Previous">‹</button>
            <button id="todayBtn" title="Today">·</button>
            <button id="nextBtn" aria-label="Next">›</button>
          </div>
          <div class="avatar" id="avatar" title="Account"></div>
        </div>
      </header>

      <div class="menu" id="menu">
        <div class="menu-info" id="menuInfo"></div>
        <button id="signOutBtn">Sign out</button>
      </div>

      <div class="weekdays">
        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
      </div>

      <div class="grid" id="grid"></div>

      <div class="editor" id="editor">
        <div class="editor-header">
          <div class="editor-date" id="editorDate"></div>
          <button class="editor-close" id="closeBtn">×</button>
        </div>
        <textarea id="noteInput" placeholder="Add a note…" rows="3"></textarea>
        <div class="editor-actions">
          <span class="status" id="status"></span>
          <button class="delete-btn" id="deleteBtn">Delete</button>
        </div>
      </div>

      <div class="footer">
        <span id="syncStatus"><span class="loading-pulse"></span> Connecting…</span>
      </div>
    </div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";

// ===================== CONFIG =====================
const firebaseConfig = {
  apiKey: "AIzaSyAO53MPBFTTg9AiDAaVir4FMGivLUScPC8",
  authDomain: "calendar-b320c.firebaseapp.com",
  projectId: "calendar-b320c",
  storageBucket: "calendar-b320c.firebasestorage.app",
  messagingSenderId: "391157443239",
  appId: "1:391157443239:web:a9a30b103392d128d70982",
  measurementId: "G-037RPHZ9T5"
};
// ===================================================

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const $ = (id) => document.getElementById(id);
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const state = {
  viewDate: new Date(),
  selectedKey: null,
  notes: {},
  saveTimer: null,
  uid: null,
  unsubscribe: null,
};

function dateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function parseKey(key) {
  const [y, m, d] = key.split('-').map(Number);
  return { y, m: m-1, d };
}
function formatDate(y, m, d) {
  return new Date(y, m, d).toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
}

function render() {
  const y = state.viewDate.getFullYear();
  const m = state.viewDate.getMonth();
  $('monthLabel').textContent = `${MONTHS[m]} ${y}`;

  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const daysInPrev = new Date(y, m, 0).getDate();

  const today = new Date();
  const todayStr = `${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;

  let html = '';

  for (let i = firstDay - 1; i >= 0; i--) {
    const d = daysInPrev - i;
    const pm = m === 0 ? 11 : m - 1;
    const py = m === 0 ? y - 1 : y;
    const key = dateKey(py, pm, d);
    html += `<div class="day muted ${state.notes[key] ? 'has-note' : ''}" data-key="${key}">${d}</div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const key = dateKey(y, m, d);
    const isToday = todayStr === `${y}-${m}-${d}`;
    const classes = ['day'];
    if (isToday) classes.push('today');
    if (state.notes[key]) classes.push('has-note');
    if (state.selectedKey === key) classes.push('selected');
    html += `<div class="${classes.join(' ')}" data-key="${key}">${d}</div>`;
  }

  const totalCells = firstDay + daysInMonth;
  const trailing = (7 - (totalCells % 7)) % 7;
  for (let d = 1; d <= trailing; d++) {
    const nm = m === 11 ? 0 : m + 1;
    const ny = m === 11 ? y + 1 : y;
    const key = dateKey(ny, nm, d);
    html += `<div class="day muted ${state.notes[key] ? 'has-note' : ''}" data-key="${key}">${d}</div>`;
  }

  $('grid').innerHTML = html;
  $('grid').querySelectorAll('.day').forEach(el => {
    el.addEventListener('click', () => selectDay(el.dataset.key));
  });
}

function selectDay(key) {
  state.selectedKey = key;
  const { y, m, d } = parseKey(key);
  $('editorDate').textContent = formatDate(y, m, d);
  $('noteInput').value = state.notes[key] || '';
  $('editor').classList.add('active');
  $('status').textContent = '';
  if (y !== state.viewDate.getFullYear() || m !== state.viewDate.getMonth()) {
    state.viewDate = new Date(y, m, 1);
  }
  render();
  setTimeout(() => $('noteInput').focus(), 100);
}

function closeEditor() {
  $('editor').classList.remove('active');
  state.selectedKey = null;
  render();
}

async function saveNote() {
  if (!state.selectedKey || !state.uid) return;
  const key = state.selectedKey;
  const value = $('noteInput').value.trim();

  try {
    const ref = doc(db, `users/${state.uid}/notes`, key);
    if (value) {
      await setDoc(ref, { text: value, updatedAt: Date.now() });
    } else {
      await deleteDoc(ref);
    }
    $('status').textContent = 'Saved';
    $('status').style.opacity = '1';
    setTimeout(() => { $('status').style.opacity = '0'; }, 1500);
  } catch (e) {
    console.error(e);
    $('status').textContent = 'Error: ' + (e.code || e.message);
  }
}

function debouncedSave() {
  if (state.saveTimer) clearTimeout(state.saveTimer);
  $('status').textContent = 'Saving…';
  $('status').style.opacity = '1';
  state.saveTimer = setTimeout(saveNote, 600);
}

async function deleteNote() {
  if (!state.selectedKey) return;
  $('noteInput').value = '';
  await saveNote();
  closeEditor();
}

function subscribeNotes(uid) {
  if (state.unsubscribe) state.unsubscribe();
  const notesRef = collection(db, `users/${uid}/notes`);
  state.unsubscribe = onSnapshot(notesRef, (snap) => {
    const next = {};
    snap.forEach(d => { next[d.id] = d.data().text; });
    state.notes = next;
    if (state.selectedKey) {
      const newText = state.notes[state.selectedKey] || '';
      if ($('noteInput').value !== newText && document.activeElement !== $('noteInput')) {
        $('noteInput').value = newText;
      }
    }
    render();
  }, (err) => {
    console.error(err);
    $('syncStatus').textContent = '⚠ ' + err.code;
  });
}

/* ---------------- Event wiring ---------------- */
$('prevBtn').addEventListener('click', () => {
  state.viewDate = new Date(state.viewDate.getFullYear(), state.viewDate.getMonth() - 1, 1);
  render();
});
$('nextBtn').addEventListener('click', () => {
  state.viewDate = new Date(state.viewDate.getFullYear(), state.viewDate.getMonth() + 1, 1);
  render();
});
$('todayBtn').addEventListener('click', () => {
  state.viewDate = new Date();
  render();
});
$('closeBtn').addEventListener('click', closeEditor);
$('deleteBtn').addEventListener('click', deleteNote);
$('noteInput').addEventListener('input', debouncedSave);

$('googleSignIn').addEventListener('click', async () => {
  $('signinError').textContent = '';
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    console.error(e);
    let msg = e.code || e.message;
    if (e.code === 'auth/popup-blocked') msg = 'Popup blocked — allow popups for this site.';
    if (e.code === 'auth/unauthorized-domain') msg = 'This domain is not authorized in Firebase.';
    $('signinError').textContent = msg;
  }
});

$('avatar').addEventListener('click', (e) => {
  e.stopPropagation();
  $('menu').classList.toggle('open');
});
document.addEventListener('click', () => $('menu').classList.remove('open'));

$('signOutBtn').addEventListener('click', async () => {
  if (state.unsubscribe) state.unsubscribe();
  await signOut(auth);
});

/* ---------------- Auth state ---------------- */
onAuthStateChanged(auth, (user) => {
  if (user) {
    state.uid = user.uid;
    $('signinScreen').style.display = 'none';
    $('calendarScreen').style.display = 'block';
    if (user.photoURL) {
      $('avatar').style.backgroundImage = `url(${user.photoURL})`;
    }
    $('menuInfo').textContent = user.email || user.displayName || '';
    $('syncStatus').textContent = '● Synced';
    render();
    subscribeNotes(user.uid);
  } else {
    state.uid = null;
    state.notes = {};
    $('calendarScreen').style.display = 'none';
    $('signinScreen').style.display = 'block';
  }
});
</script>
</body>
</html>
